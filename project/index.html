<section class="hero">

<h1 class="page-title">Featured Articles</h1>

<section class="cards-container" id="cardsContainer">
      
</section>

<section class="add-card-form">
        <h2>Add a New Article</h2>
        <form id="cardForm">
            <input type="text" name="title" placeholder="Title" required>
            <input type="text" name="category" placeholder="Category" required>
            <input type="date" name="date" placeholder="Date" required>
            <textarea name="text" placeholder="Description" required></textarea>
            <input type="text" name="authorName" placeholder="Author Name" required>
            <input type="text" name="authorRole" placeholder="Author Role" required>
            <input type="url" name="image" placeholder="Card Image URL" required>
            <input type="url" name="authorImage" placeholder="Author Image URL" required>
            <button type="submit">Add Article</button>
        </form>
    </section>
